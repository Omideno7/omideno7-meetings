name: Apply App Update Zip

on:
  push:
    branches:
      - main
    paths:
      - "app-update.zip"
      - ".github/workflows/app-update.yml"

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check update zip exists
        run: |
          if [ ! -f "app-update.zip" ]; then
            echo "app-update.zip was not found in repository root."
            exit 1
          fi

      - name: Extract and apply update
        run: |
          set -e

          rm -rf /tmp/omideno7-update
          mkdir -p /tmp/omideno7-update

          unzip -q app-update.zip -d /tmp/omideno7-update

          echo "Extracted files:"
          find /tmp/omideno7-update -maxdepth 3 -type f | head -80

          if [ -d "/tmp/omideno7-update/omideno7-meetings-react" ]; then
            SOURCE="/tmp/omideno7-update/omideno7-meetings-react"
          else
            SOURCE="/tmp/omideno7-update"
          fi

          echo "Using source folder: $SOURCE"

          python3 - <<'PY'
          import os
          import shutil
          from pathlib import Path

          source = Path(os.environ.get("SOURCE", "/tmp/omideno7-update"))
          target = Path.cwd()

          skip_names = {
              ".git",
              "node_modules",
              "dist",
              ".DS_Store",
              "app-update.zip"
          }

          for root, dirs, files in os.walk(source):
              root_path = Path(root)

              dirs[:] = [d for d in dirs if d not in skip_names]

              rel_dir = root_path.relative_to(source)
              dest_dir = target / rel_dir
              dest_dir.mkdir(parents=True, exist_ok=True)

              for file_name in files:
                  if file_name in skip_names:
                      continue

                  src_file = root_path / file_name
                  rel_file = src_file.relative_to(source)
                  dest_file = target / rel_file

                  dest_file.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src_file, dest_file)

          print("Update files copied successfully.")
          PY
        env:
          SOURCE: /tmp/omideno7-update/omideno7-meetings-react

      - name: Remove uploaded zip from repo
        run: |
          rm -f app-update.zip

      - name: Commit applied update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Apply app update zip"
          git push
